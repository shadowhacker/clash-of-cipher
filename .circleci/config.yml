version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:18.20
    working_directory: ~/app

  android-executor:
    docker:
      - image: cimg/android:2023.02
    working_directory: ~/app

jobs:
  setup:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Restore capacitor.config.ts from env
          command: |
            echo "$CAPACITOR_CONFIG_B64" | base64 -d > capacitor.config.ts
      - run:
          name: Install Node Dependencies & Capacitor Platforms
          command: |
            npm ci
            npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/ios --save-dev
      - run:
          name: Add Capacitor Platforms (android/ios)
          command: |
            npx cap add android
            npx cap add ios
      - run:
          name: Build Web App
          command: npm run build
      - run:
          name: Capacitor Sync & Copy
          command: |
            npx cap sync
            npx cap copy
      - persist_to_workspace:
          root: .
          paths:
            - .
  android-build:
    executor: android-executor
    steps:
      - attach_workspace:
          at: .
      - run:
          name: List available JVMs
          command: |
            ls -l /usr/lib/jvm/
            update-java-alternatives -l
            java -version
      # Do not set JAVA_HOME or build until correct path is known
workflows:
  version: 2
  capacitor-build:
    jobs:
      - setup
      - android-build:
          requires:
            - setup
